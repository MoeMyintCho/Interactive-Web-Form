<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Web Form Assignment</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .error-text{
            color:red;
            font-size:0.85rem;
            display:block;
            margin-top:4px;
        }

        .error-border{
            border:2px solid red !important;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                Interactive Web Form
            </h2>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>

                <input
                    type="text"
                    id="username"
                    class="form-control">

                <small id="usernameError" class="error-text"></small>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>

                <input
                    type="email"
                    id="email"
                    class="form-control">

                <small id="emailError" class="error-text"></small>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>

                <input
                    type="password"
                    id="password"
                    class="form-control">

                <small id="passwordError" class="error-text"></small>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>

                <input
                    type="password"
                    id="confirmPassword"
                    class="form-control">

                <small id="confirmPasswordError" class="error-text"></small>
            </div>

            <!-- Topics -->
            <div class="mb-3">

                <label class="form-label fw-bold">
                    Interesting Topics
                    <small id="topicError" class="error-text d-inline"></small>
                </label>

                <div class="form-check">
                    <input
                        class="form-check-input topic"
                        type="checkbox"
                        value="HTML"
                        id="html">

                    <label class="form-check-label" for="html">
                        HTML
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input topic"
                        type="checkbox"
                        value="CSS"
                        id="css">

                    <label class="form-check-label" for="css">
                        CSS
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input topic"
                        type="checkbox"
                        value="JavaScript"
                        id="javascript">

                    <label class="form-check-label" for="javascript">
                        JavaScript
                    </label>
                </div>

            </div>

            <!-- Gender -->
            <div class="mb-3">

                <label class="form-label fw-bold">
                    Gender
                    <small id="genderError" class="error-text d-inline"></small>
                </label>

                <select id="gender" class="form-select">
                    <option>--</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

            </div>

            <button
                id="submitBtn"
                class="btn btn-primary">
                Submit
            </button>

        </div>

    </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

$(document).ready(function(){

    $("#submitBtn").click(function(e){

        e.preventDefault();

        // Clear old errors
        $(".error-text").text("");

        $("#username").removeClass("error-border");
        $("#email").removeClass("error-border");
        $("#password").removeClass("error-border");
        $("#confirmPassword").removeClass("error-border");

        let valid = true;

        // Function for empty validation
        function validateEmpty(field,error){

            if(field.val().trim()==""){

                field.addClass("error-border");
                error.text("this field must not be empty");
                valid=false;

            }

        }

        validateEmpty($("#username"),$("#usernameError"));
        validateEmpty($("#email"),$("#emailError"));
        validateEmpty($("#password"),$("#passwordError"));
        validateEmpty($("#confirmPassword"),$("#confirmPasswordError"));

        // Password Match

        if($("#confirmPassword").val().trim()!="" &&
           $("#password").val()!=$("#confirmPassword").val()){

            $("#confirmPassword").addClass("error-border");

            $("#confirmPasswordError").text("confirmed password mismatched the password");

            valid=false;

        }

        // Topic validation

        if($(".topic:checked").length==0){

            $("#topicError").text("At least one topic must be selected");

            valid=false;

        }

        // Gender validation

        if($("#gender").val()=="--"){

            $("#genderError").text("please choose your gender");

            valid=false;

        }

        if(valid){

            alert("Form submitted successfully!");

        }

    });

});

</script>

</body>
</html>
